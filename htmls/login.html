    window.frontend_performance_helpers = {
        pendingPerformanceActions: [],
        startTimestamp: 0,
        sessionKey: null,
        _pageLoadTimestamp: 0,

        resetStartTimestamp: function () {
            this.startTimestamp = performance.now();
        },

        calcTimeFromStart: function () {
            return Math.round(performance.now() - this.startTimestamp);
        },

        buildPerformanceParams: function(eventName) {
            var params = {
                element_name: eventName,
                element_value: this.calcTimeFromStart(),
                type: 'performance',
                element_duration: this.getPageLoadTimestamp()
            };

            return params;
        },

        pushEventToPendingActions: function(eventName) {
            var performanceEventParams = this.buildPerformanceParams(eventName);

            this.pendingPerformanceActions.push({slug: 'track', params: performanceEventParams});
        },

        sendPerformanceEvent: function(eventName) {
            if (!window.biTracker) {
                this.pushEventToPendingActions(eventName);
                return;
            }

            var performanceEventParams = this.buildPerformanceParams(eventName);

            window.biTracker.trackPerformance(performanceEventParams);
        },

        getSessionKey: function() {
            if (!window.ms.salon_id || !window.ms.uid) {
                return null;
            }

            if (!this.sessionKey) {
                this.sessionKey = [Date.now(), window.ms.uid, window.ms.salon_id].join('_');
            }

            return this.sessionKey;
        },

        initPageLoadTimestamp: function() {
            this._pageLoadTimestamp = this.calcTimeFromStart();
        },

        getPageLoadTimestamp() {
            return this._pageLoadTimestamp;
        },

        getPerformancePendingActionsWithSessionKey: function() {
            var that = this;

            return that.pendingPerformanceActions.map(function (action) {
                var paramsWithSessionKey = Object.assign(action.params, {
                    element_time: that.getSessionKey(),
                });

                return Object.assign(action, {
                    params: paramsWithSessionKey,
                });
            });
        },
    };
</script>
